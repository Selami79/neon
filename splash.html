<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            background-image: url('neon_splash_bg.png');
            background-size: cover;
            background-position: center;
            font-family: 'Exo 2', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            overflow: hidden;
        }

        .container {
            background: rgba(44, 62, 80, 0.9);
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            border: 2px solid #3498db;
            max-width: 480px;
            width: 80%;
        }

        h1 {
            font-size: 4em;
            margin: 0 0 24px 0;
            letter-spacing: 8px;
            text-shadow: 0 0 10px #3498db, 0 0 30px #3498db;
        }

        .touch-msg {
            font-size: 1.5em;
            font-weight: bold;
            letter-spacing: 2px;
            color: #ecf0f1;
            animation: pulse 1.6s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>NEON</h1>
        <div class="touch-msg">TOUCH SCREEN TO START</div>
    </div>
</body>

</html>
